name: Deploy Airflow to MicroK8s

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure namespace
        run: |
          microk8s kubectl apply -f k8s/namespace.yaml
          echo "Waiting for namespace to be active..."
          microk8s kubectl wait --for=create namespace/airflow --timeout=15s

      - name: Create or update airflow-secret
        run: |
          microk8s kubectl create secret generic airflow-secret \
            --from-literal=DATABASE_URL='${{ secrets.AIRFLOW_DATABASE_URL }}' \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Create or update airflow-admin-secret
        run: |
          microk8s kubectl create secret generic airflow-admin-secret \
            --from-literal=USERNAME="${{ secrets.AIRFLOW_ADMIN_USERNAME }}" \
            --from-literal=PASSWORD="${{ secrets.AIRFLOW_ADMIN_PASSWORD }}" \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Create or update airflow-requirements
        run: |
          microk8s kubectl create configmap airflow-requirements \
            --from-file=requirements.txt=requirements.txt \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Create or update airflow-dags
        run: |
          microk8s kubectl create configmap airflow-dags \
            --from-file=dags/ \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Create or update airflow-src
        run: |
          microk8s kubectl create configmap airflow-src \
            --from-file=src/ \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Apply db migration job
        run: |
          # De oude job opruimen is verplicht, anders weigert Kubernetes de migratie opnieuw te draaien
          microk8s kubectl delete job airflow-db-migrate -n airflow --ignore-not-found
          microk8s kubectl apply -f k8s/db-migrate.yaml

      - name: Wait for database migration
        run: |
          echo "Waiting for database migration schema updates to complete..."
          microk8s kubectl wait --for=condition=complete job/airflow-db-migrate -n airflow --timeout=10m

      - name: Apply Airflow workloads
        run: |
          microk8s kubectl apply -f k8s/airflow.yaml -f k8s/scheduler.yaml -f k8s/dag-processor.yaml

      - name: Track api-server rollout
        run: |
          echo "Monitoring api-server startup..."
          microk8s kubectl rollout status deployment/airflow-webserver -n airflow --timeout=5m

      - name: Track scheduler rollout
        run: |
          echo "Monitoring scheduler startup..."
          microk8s kubectl rollout status deployment/airflow-scheduler -n airflow --timeout=5m

      - name: Track dag processor rollout
        run: |
          echo "Monitoring dag processor startup..."
          microk8s kubectl rollout status deployment/airflow-dag-processor -n airflow --timeout=5m

      - name: Verify cluster state
        if: always()
        run: |
          echo "=== Workload Status ==="
          microk8s kubectl get pods,svc,pvc -n airflow
          echo ""
          echo "To connect to the Airflow 3 Dashboard:"
          echo "  microk8s kubectl port-forward -n airflow svc/airflow-webserver 3003:3003"
