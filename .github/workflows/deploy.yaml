name: Deploy Airflow to MicroK8s

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure namespace
        run: |
          microk8s kubectl apply -f k8s/namespace.yaml
          echo "Waiting for namespace to be active..."
          microk8s kubectl wait --for=condition=active namespace/airflow --timeout=30s || true
          sleep 1

      - name: Create airflow-secret from GitHub Secrets
        run: |
          microk8s kubectl create secret generic airflow-secret \
            --from-literal=DATABASE_URL='${{ secrets.AIRFLOW_DATABASE_URL }}' \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -
          echo "✓ Secret created from GitHub Secrets"

      - name: Apply Kubernetes manifests
        run: |
          microk8s kubectl apply -f k8s/airflow.yaml

      - name: Wait for PVCs to be bound
        run: |
          echo "Waiting for PVCs to be bound..."
          for pvc in $(microk8s kubectl get pvc -n airflow -o jsonpath='{.items[*].metadata.name}'); do
            echo "Waiting for PVC: $pvc"
            microk8s kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/$pvc -n airflow --timeout=5m || {
              echo "⚠️ PVC $pvc failed to bind. Checking status..."
              microk8s kubectl describe pvc/$pvc -n airflow
              exit 1
            }
          done
          echo "✓ All PVCs bound"

      - name: Wait for Airflow webserver deployment
        run: |
          echo "Waiting for Airflow webserver to be ready..."
          microk8s kubectl wait --for=condition=available --timeout=5m \
            deployment/airflow-webserver -n airflow

      - name: Verify deployment
        run: |
          echo "Airflow deployment status:"
          microk8s kubectl get pods -n airflow
          microk8s kubectl get svc -n airflow
          echo "Port-forward: microk8s kubectl port-forward -n airflow svc/airflow-webserver 8080:8080"
