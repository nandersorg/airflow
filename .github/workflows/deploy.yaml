name: Deploy Airflow to MicroK8s

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure namespace
        run: |
          microk8s kubectl apply -f k8s/namespace.yaml
          # Wait until the namespace exists and is ready for mutations
          microk8s kubectl wait --for=condition=active namespace/airflow --timeout=15s

      - name: Create or update airflow-secret
        run: |
          microk8s kubectl create secret generic airflow-secret \
            --from-literal=DATABASE_URL='${{ secrets.AIRFLOW_DATABASE_URL }}' \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          microk8s kubectl apply -f k8s/airflow.yaml

      - name: Wait for PVCs to bind
        run: |
          echo "Checking volume reservation status..."
          # Selects all PVCs within the namespace simultaneously instead of looping
          microk8s kubectl wait --namespace=airflow \
            --for=jsonpath='{.status.phase}'=Bound \
            pvc --all --timeout=2m

      - name: Track Webserver Rollout Status
        run: |
          echo "Monitoring application startup..."
          # This native command blocks exactly until the new pods pass their readiness/liveness checks,
          # or exits immediately with an error code if the pods crash (no hanging).
          microk8s kubectl rollout status deployment/airflow-webserver -n airflow --timeout=5m

      - name: Verify cluster state
        if: always()
        run: |
          echo "=== Workload Status ==="
          microk8s kubectl get pods,svc,pvc -n airflow
