name: Deploy Airflow to MicroK8s

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure namespace
        run: |
          microk8s kubectl apply -f k8s/namespace.yaml

      - name: Apply Kubernetes manifests
        run: |
          microk8s kubectl apply -f k8s/airflow.yaml

      - name: Wait for Airflow webserver deployment
        run: |
          echo "Waiting for Airflow webserver to be ready..."
          microk8s kubectl wait --for=condition=available --timeout=5m \
            deployment/airflow-webserver -n airflow

      - name: Verify deployment
        run: |
          echo "Airflow deployment status:"
          microk8s kubectl get pods -n airflow
          microk8s kubectl get svc -n airflow
          echo "Port-forward: microk8s kubectl port-forward -n airflow svc/airflow-webserver 8080:8080"
