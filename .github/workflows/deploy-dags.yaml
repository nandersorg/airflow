name: Deploy Airflow DAGs to MicroK8s

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "dags/**"
      - "src/**"
      - ".github/workflows/deploy-dags.yaml"

jobs:
  deploy-dags:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect DAG and src changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD~1 HEAD)"
          else
            changed_files="$(git ls-files dags src)"
          fi

          dags_changed=false
          src_changed=false

          if printf '%s\n' "$changed_files" | grep -q '^dags/'; then
            dags_changed=true
          fi

          if printf '%s\n' "$changed_files" | grep -q '^src/'; then
            src_changed=true
          fi

          echo "dags_changed=$dags_changed" >> "$GITHUB_OUTPUT"
          echo "src_changed=$src_changed" >> "$GITHUB_OUTPUT"

      - name: Ensure namespace
        run: |
          microk8s kubectl apply -f k8s/namespace.yaml
          echo "Waiting for namespace to be active..."
          microk8s kubectl wait --for=create namespace/airflow --timeout=15s

      - name: Sync DAG files to cluster PVC
        if: steps.changes.outputs.dags_changed == 'true'
        run: |
          echo "Launching temporary DAG sync worker..."
          microk8s kubectl run dag-sync-worker -n airflow \
            --image=alpine:latest \
            --restart=Never \
            --overrides='{
              "spec": {
                "volumes": [{
                  "name": "dag-vol",
                  "persistentVolumeClaim": {"claimName": "airflow-dags-pvc"}
                }],
                "containers": [{
                  "name": "sync-container",
                  "image": "alpine:latest",
                  "command": ["sleep", "60"],
                  "volumeMounts": [{"name": "dag-vol", "mountPath": "/mnt/airflow-dags"}]
                }]
              }
            }'

          microk8s kubectl wait --for=condition=Ready pod/dag-sync-worker -n airflow --timeout=30s

          echo "Streaming files into PVC /dags directory..."
          microk8s kubectl cp dags/. airflow/dag-sync-worker:/mnt/airflow-dags/

          microk8s kubectl delete pod dag-sync-worker -n airflow --wait=false

      - name: Sync source code files to cluster PVC
        if: steps.changes.outputs.src_changed == 'true'
        run: |
          echo "Launching temporary SRC sync worker..."
          microk8s kubectl run src-sync-worker -n airflow \
            --image=alpine:latest \
            --restart=Never \
            --overrides='{
              "spec": {
                "volumes": [{
                  "name": "src-vol",
                  "persistentVolumeClaim": {"claimName": "airflow-dags-pvc"}
                }],
                "containers": [{
                  "name": "sync-container",
                  "image": "alpine:latest",
                  "command": ["sleep", "60"],
                  "volumeMounts": [{"name": "src-vol", "mountPath": "/mnt/airflow-src"}]
                }]
              }
            }'

          microk8s kubectl wait --for=condition=Ready pod/src-sync-worker -n airflow --timeout=30s

          echo "Streaming files into PVC /src directory..."
          microk8s kubectl cp src/. airflow/src-sync-worker:/mnt/airflow-src/src/

          microk8s kubectl delete pod src-sync-worker -n airflow --wait=false

      - name: Verify cluster state
        if: always()
        run: |
          echo "=== Workload Status ==="
          microk8s kubectl get pods,svc,pvc -n airflow
          echo ""
          echo "To connect to the Airflow 3 Dashboard:"
          echo "  microk8s kubectl port-forward -n airflow svc/airflow-webserver 3003:3003"
