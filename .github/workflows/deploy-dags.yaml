name: Deploy Airflow DAGs to MicroK8s

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "dags/**"
      - "src/**"
      - ".github/workflows/deploy-dags.yaml"

jobs:
  deploy-dags:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect DAG and src changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]] && [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD~1 HEAD)"
          else
            changed_files="$(git ls-files dags src)"
          fi

          dags_changed=false
          src_changed=false

          if printf '%s\n' "$changed_files" | grep -q '^dags/'; then
            dags_changed=true
          fi

          if printf '%s\n' "$changed_files" | grep -q '^src/'; then
            src_changed=true
          fi

          echo "dags_changed=$dags_changed" >> "$GITHUB_OUTPUT"
          echo "src_changed=$src_changed" >> "$GITHUB_OUTPUT"

      - name: Ensure namespace
        run: |
          microk8s kubectl apply -f k8s/namespace.yaml
          echo "Waiting for namespace to be active..."
          microk8s kubectl wait --for=create namespace/airflow --timeout=15s

      - name: Update airflow-dags configmap
        if: steps.changes.outputs.dags_changed == 'true'
        run: |
          echo "Updating ConfigMap volume with new DAG definitions..."
          microk8s kubectl create configmap airflow-dags \
            --from-file=dags/ \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Update airflow-src configmap
        if: steps.changes.outputs.src_changed == 'true'
        run: |
          echo "Updating ConfigMap volume with new src definitions..."
          microk8s kubectl create configmap airflow-src \
            --from-file=src/ \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Kick Airflow 3 DAG Processor to trigger hot reload init Containers
        if: steps.changes.outputs.dags_changed == 'true' || steps.changes.outputs.src_changed == 'true'
        run: |
          echo "Kicking DAG processor deployment to run init sync loops..."
          microk8s kubectl rollout restart deployment/airflow-dag-processor -n airflow

          # Force webserver rollout ONLY if underlying src modules alter core engine behaviors
          if [[ "${{ steps.changes.outputs.src_changed }}" == "true" ]]; then
            echo "Source utilities modified. Executing rolling restart of web interface..."
            microk8s kubectl rollout restart deployment/airflow-webserver -n airflow
          fi

      - name: Verify cluster state
        if: always()
        run: |
          echo "=== Workload Status ==="
          microk8s kubectl get pods,svc,cm -n airflow
