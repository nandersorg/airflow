name: Deploy Airflow Infra to MicroK8s

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "k8s/**"
      - "requirements.txt"
      - ".github/workflows/deploy-infra.yaml"

jobs:
  deploy-infra:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure namespace
        run: |
          microk8s kubectl apply -f k8s/namespace.yaml
          echo "Waiting for namespace to be active..."
          microk8s kubectl wait --for=create namespace/airflow --timeout=15s

      - name: Build and Push Custom Airflow Image
        run: |
          IMAGE_NAME="localhost:32000/airflow-custom:latest"

          # Build the image locally on your runner
          docker build -t $IMAGE_NAME .

          # Push it straight into your local MicroK8s registry
          docker push $IMAGE_NAME

      - name: Create or update airflow-secret
        run: |
          microk8s kubectl create secret generic airflow-secret \
            --from-literal=DATABASE_URL='${{ secrets.AIRFLOW_DATABASE_URL }}' \
            --from-literal=RESULTS_DATABASE_URL='${{ secrets.AIRFLOW_RESULTS_DATABASE_URL }}' \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Create or update airflow-admin-secret
        run: |
          microk8s kubectl create secret generic airflow-admin-secret \
            --from-literal=USERNAME="${{ secrets.AIRFLOW_ADMIN_USERNAME }}" \
            --from-literal=PASSWORD="${{ secrets.AIRFLOW_ADMIN_PASSWORD }}" \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Create or update airflow-api-secret
        run: |
          JWT_SECRET='${{ secrets.AIRFLOW_API_JWT_SECRET }}'
          if [ -z "$JWT_SECRET" ]; then
            JWT_SECRET=$(openssl rand -hex 32)
            echo "AIRFLOW_API_JWT_SECRET was empty; generated a fallback secret for this deploy."
          fi
          microk8s kubectl create secret generic airflow-api-secret \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Create or update airflow-requirements configmap
        run: |
          echo "Updating ConfigMap volume with latest requirements.txt..."
          microk8s kubectl create configmap airflow-requirements \
            --from-file=requirements.txt \
            --namespace=airflow \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Apply db migration manifest
        run: |
          microk8s kubectl replace --force -f k8s/db-migrate.yaml 2>/dev/null || microk8s kubectl apply -f k8s/db-migrate.yaml

      - name: Apply Airflow workloads
        run: |
          microk8s kubectl apply -f k8s/airflow.yaml
          microk8s kubectl apply -f k8s/scheduler.yaml
          microk8s kubectl apply -f k8s/dag-processor.yaml

      - name: Verify cluster state
        if: always()
        run: |
          echo "=== Workload Status ==="
          microk8s kubectl get pods,svc,pvc -n airflow
          echo ""
          echo "To connect to the Airflow 3 Dashboard:"
          echo "  microk8s kubectl port-forward -n airflow svc/airflow-webserver 3003:3003"
