apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-dag-processor
  namespace: airflow
  labels:
    app: airflow
    component: dag-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
      component: dag-processor
  template:
    metadata:
      labels:
        app: airflow
        component: dag-processor
    spec:
      initContainers:
        - name: install-requirements
          image: apache/airflow:3.2.2-python3.11
          command:
            - /bin/bash
            - -c
            - pip install --no-cache-dir --user -r /requirements/requirements.txt
          volumeMounts:
            - mountPath: /requirements
              name: requirements-volume
            - mountPath: /home/airflow/.local
              name: airflow-user-site
      containers:
        - name: dag-processor
          image: apache/airflow:3.2.2-python3.11
          command:
            - airflow
            - dag-processor
          env:
            - name: AIRFLOW_HOME
              value: /home/airflow
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /home/airflow/dags
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: DATABASE_URL
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: OLLAMA_HOST
              value: http://ollama-lb.gobble.svc.cluster.local:11434
            - name: NOS_BASE_URL
              value: https://nos.nl
            - name: SENTIMENT_MODEL
              value: llama3.2:1b
          volumeMounts:
            - mountPath: /home/airflow/dags
              name: dags-volume
            - mountPath: /home/airflow
              name: airflow-home
            - mountPath: /home/airflow/.local
              name: airflow-user-site
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: dags-volume
          persistentVolumeClaim:
            claimName: airflow-dags-pvc
        - name: airflow-home
          emptyDir: {}
        - name: airflow-user-site
          emptyDir: {}
        - name: requirements-volume
          configMap:
            name: airflow-requirements
