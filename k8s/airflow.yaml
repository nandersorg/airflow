apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-dags-pvc
  namespace: airflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: microk8s-hostpath
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: airflow
  labels:
    app: airflow
    component: webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
      component: webserver
  template:
    metadata:
      labels:
        app: airflow
        component: webserver
    spec:
      initContainers:
        - name: install-requirements
          image: apache/airflow:3.2.2-python3.11
          command:
            - /bin/bash
            - -c
            - pip install --no-cache-dir --user -r /requirements/requirements.txt
          volumeMounts:
            - mountPath: /requirements
              name: requirements-volume
            - mountPath: /home/airflow/.local
              name: airflow-user-site
      containers:
        - name: webserver
          image: apache/airflow:3.2.2-python3.11
          command:
            - airflow
            - api-server
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          ports:
            - containerPort: 8080
              name: webserver
          env:
            - name: AIRFLOW_HOME
              value: /home/airflow
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /home/airflow/dags
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: DATABASE_URL
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: OLLAMA_HOST
              value: http://ollama-lb.gobble.svc.cluster.local:11434
            - name: NOS_BASE_URL
              value: https://nos.nl
            - name: SENTIMENT_MODEL
              value: llama3.2:1b
          volumeMounts:
            - mountPath: /home/airflow/dags
              name: dags-volume
            - mountPath: /home/airflow
              name: airflow-home
            - mountPath: /home/airflow/.local
              name: airflow-user-site
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: dags-volume
          persistentVolumeClaim:
            claimName: airflow-dags-pvc
        - name: airflow-home
          emptyDir: {}
        - name: airflow-user-site
          emptyDir: {}
        - name: requirements-volume
          configMap:
            name: airflow-requirements
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: airflow
  labels:
    app: airflow
    component: webserver
spec:
  selector:
    app: airflow
    component: webserver
  ports:
    - port: 3003
      targetPort: 8080
      name: http
  type: LoadBalancer
