apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-db-migrate
  namespace: airflow
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: install-requirements
          image: apache/airflow:3.3.0-python3.13
          command:
            - /bin/bash
            - -c
            - pip install --no-cache-dir --user -r /requirements/requirements.txt
          volumeMounts:
            - mountPath: /requirements
              name: requirements-volume
      containers:
        - name: migrate
          image: apache/airflow:3.3.0-python3.13
          # Gewijzigd naar bash om zowel de migratie als de admin user aan te maken
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Running database migrations..."
              airflow db migrate

              echo "Creating admin user from GitHub Secrets..."
              if ! airflow users create \
                --username "$NEW_ADMIN_USER" \
                --firstname Admin \
                --lastname User \
                --role Admin \
                --email admin@nandersorg.local \
                --password "$NEW_ADMIN_PASS"; then
                echo "User might already exist."
              fi
          env:
            - name: AIRFLOW_HOME
              value: /home/airflow
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /home/airflow/dags
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: DATABASE_URL
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__HOSTNAME_CALLABLE
              value: airflow.utils.net.get_host_ip_address
            - name: AIRFLOW__API__BASE_URL
              value: http://airflow-webserver.airflow.svc.cluster.local:3003
            - name: AIRFLOW__API__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: airflow-api-secret
                  key: JWT_SECRET
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: airflow-api-secret
                  key: JWT_SECRET
            # Inladen van de admin secrets uit de nieuwe secret naam van deploy.yaml
            - name: NEW_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: airflow-admin-secret
                  key: USERNAME
            - name: NEW_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: airflow-admin-secret
                  key: PASSWORD
            - name: _AIRFLOW_DB_MIGRATION
              value: "true"
            - name: AIRFLOW__CORE__AUTH_MANAGER
              value: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
            - name: AIRFLOW__FAB__AUTH_TYPE
              value: "database"
      volumes:
        - name: requirements-volume
          configMap:
            name: airflow-requirements
