apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
      component: scheduler
  template:
    metadata:
      labels:
        app: airflow
        component: scheduler
    spec:
      initContainers:
        - name: install-requirements
          image: apache/airflow:3.2.2-python3.11
          command:
            - /bin/bash
            - -c
            - pip install --no-cache-dir --user -r /requirements/requirements.txt
          volumeMounts:
            - mountPath: /requirements
              name: requirements-volume
            - mountPath: /home/airflow/.local
              name: airflow-user-site
        - name: sync-dags
          image: apache/airflow:3.2.2-python3.11
          command:
            - /bin/bash
            - -c
            - |
              mkdir -p /home/airflow/dags /home/airflow/src
              cp -L /config/dags/* /home/airflow/dags/
              cp -L /config/src/* /home/airflow/src/
          volumeMounts:
            - mountPath: /config/dags
              name: dags-config-volume
              readOnly: true
            - mountPath: /config/src
              name: src-config-volume
              readOnly: true
            - mountPath: /home/airflow/dags
              name: dags-volume
            - mountPath: /home/airflow/src
              name: src-volume
      containers:
        - name: scheduler
          image: apache/airflow:3.2.2-python3.11
          command:
            - airflow
            - scheduler
          env:
            - name: AIRFLOW_HOME
              value: /home/airflow
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /home/airflow/dags
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: DATABASE_URL
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: OLLAMA_HOST
              value: http://ollama-lb.gobble.svc.cluster.local:11434
            - name: NOS_BASE_URL
              value: https://nos.nl
            - name: SENTIMENT_MODEL
              value: llama3.2:1b
            - name: AIRFLOW__CORE__AUTH_MANAGER
              value: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
            - name: AIRFLOW__FAB__AUTH_TYPE
              value: "database"
          volumeMounts:
            - mountPath: /home/airflow/dags
              name: dags-volume
            - mountPath: /home/airflow/src
              name: src-volume
            - mountPath: /home/airflow
              name: airflow-home
            - mountPath: /home/airflow/.local
              name: airflow-user-site
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: dags-config-volume
          configMap:
            name: airflow-dags
        - name: src-config-volume
          configMap:
            name: airflow-src
        - name: dags-volume
          emptyDir: {}
        - name: src-volume
          emptyDir: {}
        - name: airflow-home
          emptyDir: {}
        - name: airflow-user-site
          emptyDir: {}
        - name: requirements-volume
          configMap:
            name: airflow-requirements
