apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-admin-bootstrap
  namespace: airflow
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: install-requirements
          image: apache/airflow:3.2.2-python3.11
          command:
            - /bin/bash
            - -c
            - pip install --no-cache-dir --user -r /requirements/requirements.txt
          volumeMounts:
            - mountPath: /requirements
              name: requirements-volume
            - mountPath: /home/airflow/.local
              name: airflow-user-site
      containers:
        - name: bootstrap-admin
          image: apache/airflow:3.2.2-python3.11
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              username="${AIRFLOW_ADMIN_USERNAME}"
              password="${AIRFLOW_ADMIN_PASSWORD}"
              email="${AIRFLOW_ADMIN_EMAIL:-${username}@example.invalid}"
              firstname="${AIRFLOW_ADMIN_FIRSTNAME:-Airflow}"
              lastname="${AIRFLOW_ADMIN_LASTNAME:-Admin}"

              airflow users create \
                --username "${username}" \
                --password "${password}" \
                --email "${email}" \
                --firstname "${firstname}" \
                --lastname "${lastname}" \
                --role Admin

              airflow users add-role --username "${username}" --role Admin || true
          env:
            - name: AIRFLOW_HOME
              value: /home/airflow
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /home/airflow/dags
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-secret
                  key: DATABASE_URL
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: airflow-admin-secret
                  key: USERNAME
            - name: AIRFLOW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airflow-admin-secret
                  key: PASSWORD
          volumeMounts:
            - mountPath: /home/airflow
              name: airflow-home
            - mountPath: /home/airflow/.local
              name: airflow-user-site
      volumes:
        - name: airflow-home
          emptyDir: {}
        - name: airflow-user-site
          emptyDir: {}
        - name: requirements-volume
          configMap:
            name: airflow-requirements
